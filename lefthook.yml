pre-commit:
  parallel: true
  commands:
    ls-lint:
      run: bunx ls-lint
      stage_fixed: true
    typecheck:
      run: bun run typecheck

pre-push:
  commands:
    test:
      run: bun run test --run

# Block commits to main if tests fail
# Run tests before any commit to main
commit-msg:
  scripts:
    "check_main_branch.sh":
      runner: bash
