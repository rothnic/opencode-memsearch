# .ls-lint.yml - Strict file naming configuration
#
# Enforces:
# - Source files: kebab-case
# - Special files: SCREAMING_SNAKE_CASE (README.md, AGENTS.md, LICENSE.md)
# - Config files: kebab-case
# - Documentation: kebab-case (in docs/)

ls:
  # ROOT LEVEL
  .:
    # Special documentation files (SCREAMING_SNAKE_CASE)
    README.md: screamingsnakecase
    AGENTS.md: screamingsnakecase
    LICENSE.md: screamingsnakecase
    CONTRIBUTING.md: screamingsnakecase
    CHANGELOG.md: screamingsnakecase
    
    # Config files (kebab-case)
    package.json: kebabcase
    tsconfig.json: kebabcase
    .gitignore: kebabcase
    .ls-lint.yml: kebabcase
    lefthook.yml: kebabcase
    .memsearch.toml: kebabcase
    .memsearch.yaml: kebabcase
    bun.lock: kebabcase
    
    # Source files should NOT be at root (they go in src/)
    .ts: kebabcase
    .tsx: kebabcase
    .js: kebabcase
    
    # Directories (kebab-case)
    src: kebabcase
    docs: kebabcase
    scripts: kebabcase
    config: kebabcase
  
  # SUBDIRECTORY RULES
  src:
    .ts: kebabcase
    .tsx: kebabcase
    .js: kebabcase
    .dir: kebabcase
  
  scripts:
    .ts: kebabcase
    .js: kebabcase
    .sh: kebabcase
    .py: kebabcase
    .dir: kebabcase
  
  docs:
    .md: kebabcase
    .dir: kebabcase
  
  config:
    .yaml: kebabcase
    .yml: kebabcase
    .dir: kebabcase

ignore:
  - node_modules
  - .git
  - .ruff_cache
  - .memsearch
  - .sisyphus
  - .maestro
  - .weave
  - .opencode
  - logs
  - memory
  - memsearch_data
  - tmpcd
  - .DS_Store
  - dist
  - build
  - "*.d.ts"
